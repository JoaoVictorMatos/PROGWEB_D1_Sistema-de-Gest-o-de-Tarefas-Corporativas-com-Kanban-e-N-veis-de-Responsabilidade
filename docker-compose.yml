services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=kanban_db
      - POSTGRES_USER=postgres_admin
      - POSTGRES_PASSWORD=senha_secreta_gac116
    ports:
      - "5433:5432"  # Sua máquina física acessa pela 5433 (evita conflito), mas o container expõe 5432 internamente.

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=kanban_db
      - DB_USER=postgres_admin
      - DB_PASSWORD=senha_secreta_gac116
      - DB_HOST=db
      - DB_PORT=5432  # Dentro da rede do Docker, a comunicação continua na porta padrão 5432
    depends_on:
      - db

volumes:
  postgres_data: