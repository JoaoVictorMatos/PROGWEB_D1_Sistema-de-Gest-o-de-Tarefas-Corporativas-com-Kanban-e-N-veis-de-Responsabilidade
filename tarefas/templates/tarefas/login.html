<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Gestão de Tarefas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #4a90e2 0%, #3498db 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            border: none;
            border-radius: 1rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 420px;
            width: 100%;
        }
        .login-header {
            background: linear-gradient(135deg, #4a90e2 0%, #3498db 100%);
            color: #fff;
            border-radius: 1rem 1rem 0 0;
            padding: 2rem;
            text-align: center;
        }
        .login-header h2 {
            font-weight: 700;
            margin-bottom: 0.25rem;
        }
        .login-body {
            padding: 2rem;
        }
        .form-control:focus {
            border-color: #4a90e2;
            box-shadow: 0 0 0 0.2rem rgba(74, 144, 226, 0.25);
        }
        .btn-login {
            background: linear-gradient(135deg, #4a90e2 0%, #3498db 100%);
            border: none;
            color: #fff;
            font-weight: 600;
            padding: 0.75rem;
            border-radius: 0.5rem;
            transition: opacity 0.2s;
        }
        .btn-login:hover {
            opacity: 0.9;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container px-3">
        <div class="login-card card mx-auto">
            <div class="login-header">
                <i class="bi bi-kanban" style="font-size: 2.5rem;"></i>
                <h2 class="mt-2">TaskBoard</h2>
                <p class="mb-0 opacity-75">Sistema de Gestão de Tarefas</p>
            </div>
            <div class="login-body">
                {% if form.errors %}
                <div class="alert alert-danger" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    Usuário ou senha inválidos. Tente novamente.
                </div>
                {% endif %}
                {% if messages %}
                {% for message in messages %}
                <div class="alert alert-{{ message.tags }}" role="alert">{{ message }}</div>
                {% endfor %}
                {% endif %}

                <form method="post" action="{% url 'login' %}">
                    {% csrf_token %}
                    <input type="hidden" name="next" value="{{ next }}">

                    <div class="mb-3">
                        <label for="id_username" class="form-label fw-semibold">
                            <i class="bi bi-person me-1"></i> Usuário
                        </label>
                        <input
                            type="text"
                            id="id_username"
                            name="username"
                            class="form-control form-control-lg"
                            placeholder="Digite seu usuário"
                            autofocus
                            required
                        >
                    </div>

                    <div class="mb-4">
                        <label for="id_password" class="form-label fw-semibold">
                            <i class="bi bi-lock me-1"></i> Senha
                        </label>
                        <input
                            type="password"
                            id="id_password"
                            name="password"
                            class="form-control form-control-lg"
                            placeholder="Digite sua senha"
                            required
                        >
                    </div>

                    <button type="submit" class="btn btn-login w-100 btn-lg">
                        <i class="bi bi-box-arrow-in-right me-2"></i> Entrar
                    </button>
                </form>

                <hr class="my-3">
                <p class="text-center text-muted mb-0" style="font-size: 0.85rem;">
                    <i class="bi bi-shield-lock me-1"></i>
                    Acesso restrito. Apenas usuários cadastrados.
                </p>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
