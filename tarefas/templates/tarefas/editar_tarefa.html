{% extends 'tarefas/base.html' %}

{% block title %}Editar Tarefa - Sistema de Gestão de Tarefas{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        <div class="card">
            <div class="card-header bg-warning text-dark">
                <h4 class="mb-0">
                    <i class="bi bi-pencil"></i> Editar Tarefa
                </h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="titulo" class="form-label">Título *</label>
                        <input type="text" class="form-control" id="titulo" name="titulo" required
                            value="{{ tarefa.titulo }}">
                    </div>

                    <div class="mb-3">
                        <label for="descricao" class="form-label">Descrição *</label>
                        <textarea class="form-control" id="descricao" name="descricao" rows="4"
                            required>{{ tarefa.descricao }}</textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="status" class="form-label">Status *</label>
                            <select class="form-select" id="status" name="status" required>
                                {% for value, label in status_choices %}
                                <option value="{{ value }}" {% if tarefa.status == value %}selected{% endif %}>
                                    {{ label }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="prioridade" class="form-label">Prioridade *</label>
                            <select class="form-select" id="prioridade" name="prioridade" required>
                                {% for value, label in prioridade_choices %}
                                <option value="{{ value }}" {% if tarefa.prioridade == value %}selected{% endif %}>
                                    {{ label }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="responsavel" class="form-label">Responsável</label>
                            <select class="form-select" id="responsavel" name="responsavel">
                                <option value="">Não atribuído</option>
                                {% for usuario in usuarios %}
                                <option value="{{ usuario.id }}" {% if tarefa.responsavel.id == usuario.id %}selected{% endif %}>
                                    {{ usuario.get_full_name|default:usuario.username }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="data_entrega" class="form-label">Data de Entrega</label>
                            <input type="date" class="form-control" id="data_entrega" name="data_entrega"
                                value="{% if tarefa.data_entrega %}{{ tarefa.data_entrega|date:'Y-m-d' }}{% endif %}">
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-warning">
                            <i class="bi bi-check-lg"></i> Salvar Alterações
                        </button>
                        <a href="{% url 'detalhe_tarefa' tarefa.id %}" class="btn btn-secondary">
                            <i class="bi bi-x-lg"></i> Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
