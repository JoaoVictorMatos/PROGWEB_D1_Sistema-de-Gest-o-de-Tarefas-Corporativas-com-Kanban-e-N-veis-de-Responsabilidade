{% extends 'tarefas/base.html' %}

{% block title %}Criar Nova Tarefa - Sistema de Gestão de Tarefas{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">
                    <i class="bi bi-plus-circle"></i> Criar Nova Tarefa
                </h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="titulo" class="form-label">Título *</label>
                        <input type="text" class="form-control" id="titulo" name="titulo" required
                            placeholder="Digite o título da tarefa">
                    </div>

                    <div class="mb-3">
                        <label for="descricao" class="form-label">Descrição *</label>
                        <textarea class="form-control" id="descricao" name="descricao" rows="4" required
                            placeholder="Descreva a tarefa detalhadamente"></textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="projeto" class="form-label">Projeto *</label>
                            <select class="form-select" id="projeto" name="projeto" required>
                                <option value="">Selecione um projeto</option>
                                {% for projeto in projetos %}
                                <option value="{{ projeto.id }}">{{ projeto.nome }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="prioridade" class="form-label">Prioridade *</label>
                            <select class="form-select" id="prioridade" name="prioridade" required>
                                <option value="">Selecione a prioridade</option>
                                {% for value, label in prioridade_choices %}
                                <option value="{{ value }}">{{ label }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="responsavel" class="form-label">Responsável</label>
                            <select class="form-select" id="responsavel" name="responsavel">
                                <option value="">Não atribuído</option>
                                {% for usuario in usuarios %}
                                <option value="{{ usuario.id }}">{{ usuario.get_full_name|default:usuario.username }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="data_entrega" class="form-label">Data de Entrega</label>
                            <input type="date" class="form-control" id="data_entrega" name="data_entrega">
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg"></i> Criar Tarefa
                        </button>
                        <a href="{% url 'dashboard' %}" class="btn btn-secondary">
                            <i class="bi bi-x-lg"></i> Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
